name: Deploy pipeline → server

# Deploys the pipeline to the always-on server (Socket.IO mode) over SSH:
# rsync the code, install deps into the existing venv, restart the user
# systemd service. Pairs with build-worker-image.yml (which builds the ACI
# worker image for the serverless path).
#
# Required repo secrets:
#   DEPLOY_SSH_KEY   private key authorized on the server (~/.ssh/github_deploy_key)
#   DEPLOY_HOST      e.g. 4.232.82.86
#   DEPLOY_USER      e.g. medo
#
# Server prerequisites (one-time, already set up):
#   - ~/BoslaPipeline/venv  (python venv)
#   - ~/BoslaPipeline/pipeline.env  (env + secrets; NOT overwritten by deploy)
#   - user systemd unit bosla-pipeline + `loginctl enable-linger`
#   - redis-server system service

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "requirements-worker.txt"
      - "start.sh"
      - ".github/workflows/deploy-pipeline.yml"
  workflow_dispatch:

concurrency:
  group: deploy-pipeline
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync code to server
        run: |
          rsync -az --delete \
            --exclude 'venv' --exclude '.git' --exclude '__pycache__' --exclude '*.pyc' \
            --exclude '.pytest_cache' --exclude 'pipeline.env' --exclude 'pipeline.log' \
            --exclude 'run_pipeline.env' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/BoslaPipeline/"

      - name: Install deps + restart service
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'bash -s' <<'REMOTE'
          set -e
          cd ~/BoslaPipeline
          ./venv/bin/python -m pip install -q -r requirements-worker.txt
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          systemctl --user restart bosla-pipeline
          sleep 6
          curl -fsS -m 5 http://127.0.0.1:7860/health
          echo
          echo "deployed: $(systemctl --user is-active bosla-pipeline)"
          REMOTE
